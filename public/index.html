<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>CloudTerm</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.min.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg:       #0d0f14;
    --surface:  #13161e;
    --border:   #1e2330;
    --accent:   #00e5a0;
    --accent2:  #00b8ff;
    --warn:     #ff5f57;
    --text:     #cdd6f4;
    --muted:    #45475a;
    --bar-h:    44px;
    --keys-h:   52px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--bar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 10px;
    z-index: 100;
    user-select: none;
  }

  #topbar .logo {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .04em;
    color: var(--accent);
    flex: 1;
  }

  #topbar .logo svg { flex-shrink: 0; }

  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
    flex-shrink: 0;
  }
  #status-dot.online  { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  #status-dot.offline { background: var(--warn);   box-shadow: 0 0 6px var(--warn); }

  #status-label {
    font-size: 10px;
    color: var(--muted);
    transition: color .3s;
  }

  .topbtn {
    background: var(--border);
    border: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }
  .topbtn:active { background: var(--accent); color: #000; }

  /* ── TERMINAL WRAPPER ── */
  #terminal-wrap {
    position: fixed;
    top: var(--bar-h);
    left: 0; right: 0;
    bottom: var(--keys-h);
    overflow: hidden;
    background: var(--bg);
  }

  #terminal {
    width: 100%;
    height: 100%;
    padding: 6px 4px 4px 4px;
  }

  /* fix xterm canvas */
  .xterm { height: 100% !important; }
  .xterm-viewport { overflow-y: auto !important; }
  .xterm-screen  { width: 100% !important; }

  /* ── SPLASH (before connect) ── */
  #splash {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: var(--bg);
    z-index: 10;
    transition: opacity .4s;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }

  #splash .big-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #splash h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: .05em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #splash p { font-size: 12px; color: var(--muted); text-align: center; padding: 0 30px; }

  #connect-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    border: none;
    padding: 13px 36px;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: .05em;
    box-shadow: 0 4px 24px rgba(0,229,160,.25);
    transition: transform .1s, box-shadow .1s;
  }
  #connect-btn:active { transform: scale(.97); box-shadow: none; }

  /* ── EXTRA KEYS BAR ── */
  #keybar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--keys-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    overflow-x: auto;
    overflow-y: hidden;
    gap: 6px;
    padding: 0 8px;
    z-index: 100;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #keybar::-webkit-scrollbar { display: none; }

  .key {
    flex-shrink: 0;
    background: var(--border);
    border: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    height: 34px;
    min-width: 36px;
    padding: 0 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .1s, color .1s, transform .08s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .key:active  { background: var(--accent); color: #000; transform: scale(.93); }
  .key.accent  { background: rgba(0,229,160,.12); color: var(--accent); border: 1px solid rgba(0,229,160,.25); }
  .key.danger  { background: rgba(255,95,87,.10);  color: var(--warn);   border: 1px solid rgba(255,95,87,.25); }

  /* ── RECONNECT OVERLAY ── */
  #reconnect-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(13,15,20,.85);
    backdrop-filter: blur(4px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 20;
  }
  #reconnect-overlay.show { display: flex; }
  #reconnect-overlay p { color: var(--warn); font-size: 13px; }
  #reconnect-overlay button {
    background: var(--warn);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    border: none;
    padding: 11px 28px;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
    </svg>
    CloudTerm
  </div>
  <div id="status-dot"></div>
  <span id="status-label">desconectado</span>
  <button class="topbtn" onclick="clearTerminal()">Limpar</button>
  <button class="topbtn" onclick="reconnect()">↺</button>
</div>

<!-- TERMINAL -->
<div id="terminal-wrap">
  <div id="terminal"></div>

  <!-- SPLASH -->
  <div id="splash">
    <div class="big-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.2">
        <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
      </svg>
    </div>
    <h2>CloudTerm</h2>
    <p>Terminal real na nuvem.<br/>Sem simulação. Bash direto no servidor.</p>
    <button id="connect-btn" onclick="initTerminal()">Conectar Terminal</button>
  </div>

  <!-- RECONNECT -->
  <div id="reconnect-overlay">
    <p>⚠️ Conexão perdida</p>
    <button onclick="reconnect()">Reconectar</button>
  </div>
</div>

<!-- EXTRA KEYS -->
<div id="keybar">
  <button class="key accent" onclick="sendKey('\t')">TAB</button>
  <button class="key danger" onclick="sendCtrl('c')">CTRL+C</button>
  <button class="key danger" onclick="sendCtrl('d')">CTRL+D</button>
  <button class="key" onclick="sendCtrl('z')">CTRL+Z</button>
  <button class="key" onclick="sendCtrl('l')">CTRL+L</button>
  <button class="key" onclick="sendEsc()">ESC</button>
  <button class="key" onclick="sendKey('\x1b[A')">▲</button>
  <button class="key" onclick="sendKey('\x1b[B')">▼</button>
  <button class="key" onclick="sendKey('\x1b[D')">◀</button>
  <button class="key" onclick="sendKey('\x1b[C')">▶</button>
  <button class="key" onclick="sendKey('\x1b[H')">HOME</button>
  <button class="key" onclick="sendKey('\x1b[F')">END</button>
  <button class="key" onclick="sendKey('\x1b[3~')">DEL</button>
  <button class="key" onclick="sendKey('\x1b[5~')">PG↑</button>
  <button class="key" onclick="sendKey('\x1b[6~')">PG↓</button>
  <button class="key accent" onclick="focusInput()">Teclado</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xterm-addon-fit/0.8.0/xterm-addon-fit.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xterm-addon-web-links/0.9.0/xterm-addon-web-links.min.js"></script>

<script>
// ── CONFIG ──────────────────────────────────────────
const WS_URL = (() => {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  return `${proto}://${location.host}`;
})();

// ── STATE ────────────────────────────────────────────
let term, fitAddon, ws;
let termReady = false;

// ── INIT XTERM ───────────────────────────────────────
function buildTerminal() {
  if (term) { term.dispose(); }

  term = new Terminal({
    cursorBlink: true,
    cursorStyle: 'block',
    fontFamily: "'JetBrains Mono', 'Courier New', monospace",
    fontSize: window.innerWidth < 400 ? 12 : 13,
    lineHeight: 1.2,
    theme: {
      background:    '#0d0f14',
      foreground:    '#cdd6f4',
      cursor:        '#00e5a0',
      cursorAccent:  '#0d0f14',
      selectionBackground: 'rgba(0,229,160,0.25)',
      black:   '#45475a', red:     '#f38ba8',
      green:   '#a6e3a1', yellow:  '#f9e2af',
      blue:    '#89b4fa', magenta: '#f5c2e7',
      cyan:    '#94e2d5', white:   '#bac2de',
      brightBlack:   '#585b70', brightRed:     '#f38ba8',
      brightGreen:   '#a6e3a1', brightYellow:  '#f9e2af',
      brightBlue:    '#89b4fa', brightMagenta: '#f5c2e7',
      brightCyan:    '#94e2d5', brightWhite:   '#a6adc8',
    },
    allowProposedApi: true,
    scrollback: 5000,
    convertEol: false,
  });

  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());

  term.open(document.getElementById('terminal'));
  fitAddon.fit();

  termReady = true;

  // Input → WebSocket
  term.onData((data) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'input', data }));
    }
  });

  // Mantém o teclado aberto no mobile ao tocar no terminal
  term.element.addEventListener('touchend', () => {
    setTimeout(() => term.focus(), 80);
  });
}

// ── WEBSOCKET ────────────────────────────────────────
function connectWS() {
  setStatus('connecting');

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setStatus('online');
    document.getElementById('reconnect-overlay').classList.remove('show');
    sendResize();
    term.focus();
  };

  ws.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      if (msg.type === 'output') {
        term.write(msg.data);
      } else if (msg.type === 'exit') {
        term.write(`\r\n\x1b[31m[processo encerrado — código ${msg.code}]\x1b[0m\r\n`);
        setStatus('offline');
      }
    } catch (_) {}
  };

  ws.onclose = () => {
    setStatus('offline');
    if (termReady) {
      document.getElementById('reconnect-overlay').classList.add('show');
    }
  };

  ws.onerror = () => {
    setStatus('offline');
  };
}

// ── PUBLIC ACTIONS ───────────────────────────────────
function initTerminal() {
  const splash = document.getElementById('splash');
  splash.classList.add('hidden');
  setTimeout(() => { splash.style.display = 'none'; }, 400);

  buildTerminal();
  connectWS();
}

function reconnect() {
  document.getElementById('reconnect-overlay').classList.remove('show');
  if (ws) { try { ws.close(); } catch (_) {} }
  connectWS();
}

function clearTerminal() {
  if (term) term.clear();
}

function sendKey(seq) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'input', data: seq }));
  }
  if (term) term.focus();
}

function sendCtrl(key) {
  const code = key.toLowerCase().charCodeAt(0) - 96;
  sendKey(String.fromCharCode(code));
}

function sendEsc() { sendKey('\x1b'); }

function focusInput() {
  if (term) term.focus();
}

// ── RESIZE ───────────────────────────────────────────
function sendResize() {
  if (!fitAddon || !ws || ws.readyState !== WebSocket.OPEN) return;
  fitAddon.fit();
  const dims = fitAddon.proposeDimensions();
  if (dims) {
    ws.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
  }
}

const resizeObserver = new ResizeObserver(() => {
  if (termReady) { fitAddon.fit(); sendResize(); }
});
resizeObserver.observe(document.getElementById('terminal-wrap'));

window.addEventListener('resize', () => {
  if (termReady) { fitAddon.fit(); sendResize(); }
});

// Teclado virtual mobile → redimensiona
window.visualViewport?.addEventListener('resize', () => {
  const wrap = document.getElementById('terminal-wrap');
  const vvh = window.visualViewport.height;
  const barH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--bar-h'));
  const keyH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--keys-h'));
  const keybarTop = window.innerHeight - keyH;
  const kbHeight = Math.max(0, window.innerHeight - vvh);
  wrap.style.bottom = (keyH + kbHeight) + 'px';
  document.getElementById('keybar').style.bottom = kbHeight + 'px';
  if (termReady) { fitAddon.fit(); sendResize(); }
});

// ── STATUS ───────────────────────────────────────────
function setStatus(s) {
  const dot   = document.getElementById('status-dot');
  const label = document.getElementById('status-label');
  dot.className = '';
  if (s === 'online')      { dot.classList.add('online');  label.textContent = 'conectado'; label.style.color = 'var(--accent)'; }
  else if (s === 'offline'){ dot.classList.add('offline'); label.textContent = 'desconectado'; label.style.color = 'var(--warn)'; }
  else                     { label.textContent = 'conectando…'; label.style.color = 'var(--muted)'; }
}
</script>
</body>
</html>
